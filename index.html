<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chef Flash - No API</title>
    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers';

        let generator;
        async function init() {
            const status = document.getElementById('status');
            status.innerText = "⚡ Preparazione cucina (5-10 sec)...";
            // Usiamo TinyLlama: piccolissimo e veloce
            generator = await pipeline('text-generation', 'Xenova/TinyLlama-1.1B-Chat-v1.0');
            status.innerText = "✅ Chef Pronto!";
        }
        window.init = init;

        async function genera() {
            const i = document.getElementById('ingr').value;
            const res = document.getElementById('res');
            res.innerText = "🍳 Sto cucinando...";
            
            const prompt = `<|system|>Sei un cuoco veloce.</s><|user|>Ricetta con: ${i}</s><|assistant|>`;
            const out = await generator(prompt, { max_new_tokens: 150, temperature: 0.7 });
            
            // Puliamo il testo per mostrare solo la risposta
            const testo = out[0].generated_text.split('<|assistant|>')[1];
            res.innerText = testo || "Ecco la tua ricetta!";
        }
        window.genera = genera;
    </script>
</head>
<body onload="init()">
    <h2>⚡ Chef Flash (Locale e Veloce)</h2>
    <p id="status">Inizializzazione...</p>
    <textarea id="ingr" style="width:100%; height:60px;" placeholder="Ingredienti..."></textarea>
    <button onclick="genera()" style="width:100%; padding:10px; background:#e67e22; color:white; border:none;">Genera Subito</button>
    <div id="res" style="white-space: pre-wrap; margin-top:15px; background:#f9f9f9; padding:10px;"></div>
</body>
</html>
