<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chef Online Rapido</title>
</head>
<body style="font-family:sans-serif; padding:20px; text-align:center;">
    <h1>👨‍🍳 Chef Online Istantaneo</h1>
    <textarea id="ingr" placeholder="Cosa hai in frigo?" style="width:90%; height:100px;"></textarea><br>
    <button onclick="cucina()" style="padding:15px; margin-top:10px; width:90%; background:#27ae60; color:white; border:none; cursor:pointer;">Genera Ricetta</button>
    <div id="res" style="margin-top:20px; text-align:left; background:#f4f4f4; padding:15px; border-radius:10px;"></div>

    <script>
        async function cucina() {
            const i = document.getElementById('ingr').value;
            const resDiv = document.getElementById('res');
            resDiv.innerText = "🍳 Lo chef sta scrivendo...";

            // Usiamo un modello pubblico gratuito che non richiede login per piccoli usi
            const response = await fetch("https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: `Crea una ricetta italiana con: ${i}. Sii breve.` })
            });
            const data = await response.json();
            resDiv.innerText = data[0]?.generated_text || "Lo chef è timido oggi, riprova!";
        }
    </script>
</body>
</html>
