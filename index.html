<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chef AI - Generatore Istantaneo</title>
</head>
<body style="font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background: #fafafa;">
    <h1>👨‍🍳 Chef Creativo (No-DB)</h1>
    <p>Inserisci gli ingredienti e l'IA creerà una ricetta nuova ora.</p>
    <textarea id="ingr" style="width:100%; height:80px;" placeholder="Es: uova, latte, un pizzico di sale..."></textarea>
    <button onclick="creaOra()" style="width:100%; padding:15px; background: #e67e22; color:white; border:none; margin-top:10px; cursor:pointer;">CREA RICETTA</button>
    
    <div id="res" style="margin-top:20px; background:white; padding:15px; border-left: 5px solid #e67e22; white-space: pre-wrap;"></div>

    <script>
        async function creaOra() {
            const i = document.getElementById('ingr').value;
            const res = document.getElementById('res');
            res.innerText = "👨‍🍳 Lo chef sta inventando...";

            // Modello GPT-2 o Mistral (Serverless): non deve scaricare nulla sul PC
            try {
                const response = await fetch("https://api-inference.huggingface.co/models/Mistral-7B-Instruct-v0.2", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        inputs: `[INST] Crea una ricetta originale con questi ingredienti: ${i}. Sii creativo e scrivi in italiano. [/INST]`,
                        parameters: { max_new_tokens: 300 }
                    })
                });
                const data = await response.json();
                res.innerText = data[0].generated_text.split("[/INST]")[1] || "Errore di creazione.";
            } catch (e) {
                res.innerText = "Il server è troppo occupato. Riprova tra 5 secondi!";
            }
        }
    </script>
</body>
</html>
