<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chef Istantaneo v3</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #fff5e6; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
        button { background: #ff6b6b; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>👨‍🍳 Chef Super-Fast</h1>
        <input type="text" id="ingr" placeholder="Es: uova, latte, farina">
        <button onclick="trovaRicetta()">Cucina Ora!</button>
        <div id="res" style="margin-top:20px; text-align:left; font-style: italic;"></div>
    </div>

    <script>
        const ricette = {
            "uova,latte": "Omelette soffice: Sbatti le uova con un goccio di latte e cuoci in padella con burro.",
            "uova,farina": "Pasta fresca veloce: Impasta 1 uovo ogni 100g di farina finché non è liscio.",
            "latte,farina": "Besciamella base: Scalda il latte e aggiungi la farina mescolando per addensare.",
            "uova,latte,farina": "Crepes classiche: Mescola tutto insieme e cuoci un mestolo alla volta in padella calda."
        };

        function trovaRicetta() {
            const i = document.getElementById('ingr').value.toLowerCase().replace(/ /g, '');
            const res = document.getElementById('res');
            // Cerca la combinazione esatta o suggerisce la più vicina
            res.innerText = ricette[i] || "Ricetta non trovata nel database rapido, ma prova a fare una frittata mista!";
        }
    </script>
</body>
</html>
