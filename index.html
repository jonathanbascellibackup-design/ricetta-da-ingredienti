<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chef Offline Base</title>
    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers';

        let generator;
        async function init() {
            document.getElementById('status').innerText = "🤖 Lo Chef sta arrivando (caricamento)...";
            // Questo scarica il modello solo la prima volta
            generator = await pipeline('text-generation', 'Xenova/llama2-7b-summarizer-onnx');
            document.getElementById('status').innerText = "✅ Chef pronto (Senza API!)";
        }
        window.init = init;

        async function genera() {
            const i = document.getElementById('ingr').value;
            document.getElementById('res').innerText = "Sto scrivendo la ricetta...";
            const out = await generator(`Crea una ricetta con: ${i}`, { max_new_tokens: 200 });
            document.getElementById('res').innerText = out[0].generated_text;
        }
        window.genera = genera;
    </script>
</head>
<body onload="init()">
    <h1>👨‍🍳 Chef Base (No API / No Chiavi)</h1>
    <p id="status">Inizializzazione...</p>
    <textarea id="ingr" placeholder="Cosa hai in frigo?"></textarea>
    <button onclick="genera()">Crea Ricetta</button>
    <div id="res" style="white-space: pre-wrap; background: #f0f0f0; padding: 10px;"></div>
</body>
</html>
