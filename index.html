<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chef Gemini - Base</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; border-radius: 10px; background: #f9f9f9; }
        textarea { width: 100%; height: 100px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 12px; background: #27ae60; color: white; border: none; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        #res { margin-top: 20px; white-space: pre-wrap; background: white; padding: 15px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>👨‍🍳 Chef Gemini Base</h1>
    <textarea id="ingr" placeholder="Esempio: 2 uova, farina, latte..."></textarea>
    <button onclick="cucina()">Genera Ricetta</button>
    <div id="res"></div>

    <script>
        let apiKeys = [];
        // Carica le chiavi dal file JSON
        fetch('api.json').then(r => r.json()).then(d => apiKeys = d.keys).catch(e => console.error("Errore JSON:", e));

        async function cucina() {
            const i = document.getElementById('ingr').value;
            if (!apiKeys || apiKeys.length === 0) return alert("Errore: Chiavi non caricate.");
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKeys[0]}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: "Sei un cuoco. Crea una ricetta con: " + i }] }] })
            });
            const data = await res.json();
            // Gestione errore per evitare 'reading 0'
            document.getElementById('res').innerText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Errore: Controlla la chiave API.";
        }
    </script>
</body>
</html>
