<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chef Gemini - Base</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; }
        textarea { width: 100%; height: 100px; }
        button { padding: 10px; background: #27ae60; color: white; border: none; cursor: pointer; width: 100%; }
        #res { margin-top: 20px; white-space: pre-wrap; background: #eee; padding: 10px; }
    </style>
</head>
<body>
    <h1>👨‍🍳 Chef Gemini Base</h1>
    <textarea id="ingr" placeholder="Lista ingredienti..."></textarea>
    <button onclick="cucina()">Genera Ricetta</button>
    <div id="res"></div>

    <script>
        let apiKeys = [];
        fetch('api.json').then(r => r.json()).then(d => apiKeys = d.keys);

        async function cucina() {
            const i = document.getElementById('ingr').value;
            if (!apiKeys.length) return alert("Caricamento chiavi...");
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKeys[0]}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: "Sei un cuoco. Crea una ricetta con: " + i }] }] })
            });
            const data = await res.json();
            document.getElementById('res').innerText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Errore API";
        }
    </script>
</body>
</html>
