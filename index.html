<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chef Istantaneo</title>
    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers';

        let pipe;
        async function init() {
            const status = document.getElementById('status');
            status.innerText = "⏳ Preparazione cucina in corso...";
            // Modello super leggero (circa 40MB), si carica in un attimo
            pipe = await pipeline('text-generation', 'Xenova/TinyLlama-1.1B-Chat-v1.0');
            status.innerText = "✅ Chef pronto!";
        }
        window.init = init;

        async function cucina() {
            const ingr = document.getElementById('ingr').value;
            const res = document.getElementById('res');
            res.innerText = "👨‍🍳 Sto scrivendo...";
            
            const prompt = `Ricetta veloce con: ${ingr}`;
            const out = await pipe(prompt, { max_new_tokens: 100 });
            res.innerText = out[0].generated_text;
        }
        window.cucina = cucina;
    </script>
</head>
<body onload="init()" style="font-family:sans-serif; text-align:center; padding:20px;">
    <h1>🍳 Chef Istantaneo</h1>
    <p id="status">Caricamento...</p>
    <input type="text" id="ingr" placeholder="Cosa hai in frigo?" style="width:80%; padding:10px;">
    <button onclick="cucina()" style="padding:10px 20px; margin-top:10px; cursor:pointer;">Genera</button>
    <div id="res" style="margin-top:20px; background:#f0f0f0; padding:15px; border-radius:8px;"></div>
</body>
</html>
